<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幼儿园欢乐抽奖小乐园</title>
    <link rel="stylesheet" href="style.css">
    <!-- Excel解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <!-- 卡通背景装饰 -->
    <div class="bg-decor"></div>
    <div class="container">
        <!-- 顶部标题区 -->
        <div class="title-box">
            <h1>🌈 幼儿园欢乐抽奖乐园 🌈</h1>
            <p>导入小朋友名单，公平抽幸运宝贝！</p>
        </div>

        <!-- Excel导入卡片 -->
        <div class="card import-card">
            <div class="card-header">
                <h2>📂 导入小朋友名单</h2>
                <span class="status-light" id="statusLight"></span>
            </div>
            <div class="card-content">
                <input type="file" id="excelFile" accept=".xlsx,.xls" hidden>
                <button id="importBtn" class="btn btn-blue">上传Excel名单</button>
                <p class="tips">小贴士：Excel第一列写小朋友名字，一行一个哦</p>
            </div>
        </div>

        <!-- 隐藏文本输入框，逻辑保留 -->
        <div class="input-box" hidden>
            <textarea id="nameList"></textarea>
        </div>

        <!-- 中间抽奖大屏 -->
        <div class="card draw-card">
            <div class="draw-screen" id="showName">
                等待导入名单开始抽奖✨
            </div>
        </div>

        <!-- 操作按钮组 -->
        <div class="btn-group">
            <button id="startBtn" class="btn btn-green">🎉 开始滚动</button>
            <button id="stopBtn" class="btn btn-orange">🎁 停止开奖</button>
            <button id="resetBtn" class="btn btn-pink">🔄 全部重置</button>
        </div>

        <!-- 中奖小朋友记录 -->
        <div class="card record-card">
            <div class="card-header">
                <h2>🏆 幸运小宝贝名单</h2>
            </div>
            <div class="card-content">
                <ul id="recordList" class="record-list"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
